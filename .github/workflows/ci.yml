name: CI — Build, Test, Scan

on:
  push:
    branches: [develop, main, 'feature/**', 'hotfix/**']
  pull_request:
    branches: [develop, main]

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'
  REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  BE_IMAGE: loanlens-backend
  FE_IMAGE: loanlens-frontend

jobs:
  backend-ci:
    name: Backend — Lint, Test, Build
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.3
        env: { MYSQL_ROOT_PASSWORD: test, MYSQL_DATABASE: loanlens_test, MYSQL_USER: test, MYSQL_PASSWORD: test }
        ports: ['3306:3306']
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with: { java-version: '${{ env.JAVA_VERSION }}', distribution: temurin, cache: maven }

      - name: Run Checkstyle
        run: cd backend && mvn checkstyle:check -q

      - name: Run tests with coverage
        env:
          DB_URL: jdbc:mysql://localhost:3306/loanlens_test?useSSL=false&allowPublicKeyRetrieval=true
          DB_USER: test
          DB_PASS: test
          REDIS_HOST: localhost
          JWT_SECRET: test-jwt-secret-for-ci-minimum-32-chars
        run: cd backend && mvn verify -Pci

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with: { files: backend/target/site/jacoco/jacoco.xml, flags: backend }

      - name: OWASP Dependency Check
        run: cd backend && mvn org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=7

      - name: Build JAR
        run: cd backend && mvn package -DskipTests -q

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with: { name: backend-jar, path: backend/target/loanlens-api-*.jar }

  frontend-ci:
    name: Frontend — Lint, Test, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm, cache-dependency-path: frontend/package-lock.json }

      - name: Install dependencies
        run: cd frontend && npm ci --silent

      - name: Lint
        run: cd frontend && npm run lint

      - name: Run tests
        run: cd frontend && npm test -- --coverage --watchAll=false

      - name: Build
        run: cd frontend && npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with: { name: frontend-dist, path: frontend/dist/ }

  docker-build-push:
    name: Docker — Build & Push to ECR
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    outputs:
      be_tag: ${{ steps.meta.outputs.be_tag }}
      fe_tag: ${{ steps.meta.outputs.fe_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with: { name: backend-jar, path: backend/target }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: meta
        run: |
          SHA="${{ github.sha }}"
          SHORT="${SHA:0:8}"
          echo "be_tag=${{ env.REGISTRY }}/${{ env.BE_IMAGE }}:${SHORT}" >> $GITHUB_OUTPUT
          echo "fe_tag=${{ env.REGISTRY }}/${{ env.FE_IMAGE }}:${SHORT}" >> $GITHUB_OUTPUT

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: devops/docker/Dockerfile.backend
          push: true
          tags: ${{ steps.meta.outputs.be_tag }},${{ env.REGISTRY }}/${{ env.BE_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: devops/docker/Dockerfile.frontend
          push: true
          tags: ${{ steps.meta.outputs.fe_tag }},${{ env.REGISTRY }}/${{ env.FE_IMAGE }}:latest

      - name: Trivy scan — Backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.be_tag }}
          format: sarif
          output: trivy-be.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with: { sarif_file: trivy-be.sarif }

  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: docker-build-push
    environment: staging
    concurrency: { group: staging-deploy, cancel-in-progress: false }

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name loanlens-eks --region ${{ secrets.AWS_REGION }}

      - name: Deploy to staging
        run: |
          kubectl set image deployment/loanlens-backend loanlens-backend=${{ needs.docker-build-push.outputs.be_tag }} -n loanlens-staging
          kubectl set image deployment/loanlens-frontend loanlens-frontend=${{ needs.docker-build-push.outputs.fe_tag }} -n loanlens-staging
          kubectl rollout status deployment/loanlens-backend -n loanlens-staging --timeout=120s
          kubectl rollout status deployment/loanlens-frontend -n loanlens-staging --timeout=60s

      - name: Run E2E on staging
        run: |
          npx playwright install --with-deps chromium
          cd qa/playwright && BASE_URL=https://staging.loanlens.app npx playwright test e2e.spec.ts --reporter=github

  deploy-production:
    name: Deploy → Production (manual gate)
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://loanlens.app

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name loanlens-eks --region ${{ secrets.AWS_REGION }}

      - name: Blue-green deploy to production
        run: |
          kubectl set image deployment/loanlens-backend loanlens-backend=${{ needs.docker-build-push.outputs.be_tag }} -n loanlens-prod
          kubectl set image deployment/loanlens-frontend loanlens-frontend=${{ needs.docker-build-push.outputs.fe_tag }} -n loanlens-prod
          kubectl rollout status deployment/loanlens-backend -n loanlens-prod --timeout=180s
          kubectl rollout status deployment/loanlens-frontend -n loanlens-prod --timeout=90s
          echo "✅ Production deployment complete: ${{ needs.docker-build-push.outputs.be_tag }}"

      - name: Notify on success
        if: success()
        run: echo "::notice title=Deployed::Production deploy successful for commit ${{ github.sha }}"

      - name: Auto-rollback on failure
        if: failure()
        run: |
          echo "⚠️ Deploy failed — rolling back"
          kubectl rollout undo deployment/loanlens-backend -n loanlens-prod
          kubectl rollout undo deployment/loanlens-frontend -n loanlens-prod
          echo "::error title=RolledBack::Production deploy failed and was rolled back"
