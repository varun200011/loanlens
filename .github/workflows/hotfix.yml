name: Hotfix — Fast-track to Production

on:
  push:
    branches: ['hotfix/**']

jobs:
  hotfix-ci:
    name: Hotfix CI — Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: temurin, cache: maven }
      - name: Run tests
        run: cd backend && mvn verify -DskipITs -q
        env:
          JWT_SECRET: test-jwt-secret-for-ci-minimum-32-chars
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: cd frontend && npm ci --silent && npm test -- --watchAll=false
      - name: Build & push Docker images
        run: echo "Docker build/push would run here (same as ci.yml)"

  hotfix-deploy:
    name: Deploy Hotfix → Production
    needs: hotfix-ci
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://loanlens.app
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS + deploy
        run: echo "Fast-track k8s rollout with rollback on failure"
      - name: Notify team
        run: echo "::notice title=Hotfix Deployed::Hotfix from ${{ github.ref }} deployed to production"
