apiVersion: apps/v1
kind: Deployment
metadata:
  name: loanlens-backend
  namespace: loanlens-prod
  labels: { app: loanlens, component: backend }
spec:
  replicas: 2
  selector:
    matchLabels: { app: loanlens, component: backend }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  template:
    metadata:
      labels: { app: loanlens, component: backend }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "8080"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: loanlens-backend
          image: BACKEND_IMAGE_PLACEHOLDER
          ports: [{ containerPort: 8080 }]
          env:
            - name: DB_URL
              valueFrom: { secretKeyRef: { name: loanlens-db-secret, key: url } }
            - name: DB_USER
              valueFrom: { secretKeyRef: { name: loanlens-db-secret, key: username } }
            - name: DB_PASS
              valueFrom: { secretKeyRef: { name: loanlens-db-secret, key: password } }
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: loanlens-jwt-secret, key: secret } }
            - name: REDIS_HOST
              valueFrom: { configMapKeyRef: { name: loanlens-config, key: redis-host } }
            - name: SPRING_PROFILES_ACTIVE
              value: prod
          resources:
            requests: { memory: 512Mi, cpu: 250m }
            limits:  { memory: 1Gi,  cpu: 1000m }
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8080 }
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: loanlens-backend
  namespace: loanlens-prod
spec:
  selector: { app: loanlens, component: backend }
  ports: [{ port: 8080, targetPort: 8080 }]
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: loanlens-backend-hpa
  namespace: loanlens-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: loanlens-backend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
