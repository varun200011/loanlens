global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: loanlens-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['loanlens-backend:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: loanlens-api
